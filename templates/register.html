<!DOCTYPE html>
<html>

<head>
    <title>Register - MediGuardian AI</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-container">

        <h1>Create Account</h1>

        <form action="/register" method="POST">

            <input
                type="text"
                name="fullname"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Register
            </button>

        </form>

        <p>

            Already have an account?

            <a href="/login">

                Login

            </a>

        </p>

    </div>

</body>

</html>
