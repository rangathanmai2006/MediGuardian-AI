<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Upload Report | MediGuardian AI</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<nav>

    <div class="logo">

        <i class="fas fa-heart-pulse"></i>

        MediGuardian AI

    </div>

</nav>


<section class="upload-container">

    <div class="upload-box">

        <i class="fa-solid fa-file-medical upload-icon"></i>

        <h1>Upload Your Medical Report</h1>

        <p>

            Upload PDF, JPG or PNG medical reports.
            AI will analyze and generate your personalized health dashboard.

        </p>
        <form action="/analyze" method="POST" enctype="multipart/form-data">

           

            <input
                type="file"
                name="report"
                accept=".pdf,.jpg,.jpeg,.png"
                required>

            <br><br>

            <button type="submit">
                Analyze Report
            </button>

        </form>
            

    </div>

</section>

</body>

</html>
