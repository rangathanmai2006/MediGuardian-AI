<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | MediGuardian AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<nav>

    <div class="logo">
        ❤️ MediGuardian AI
    </div>

</nav>

<section class="upload-container">

    <div class="upload-box">

        <h1>Welcome Back</h1>

        <p>Login to continue to MediGuardian AI</p>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <br><br>

            <button type="submit">
                Login
            </button>

        </form>

        <br>

        <p>
            Don't have an account?

            <a href="{{ url_for('register') }}">
                Register
            </a>

        </p>

    </div>

</section>

</body>

</html>
